apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: project-staging

resources:
- ../../base
- namespace.yaml

patches:
- patch: |-
    - op: replace
      path: /data/APP_ENVIRONMENT
      value: staging
  target:
    kind: ConfigMap
    name: todo-app-config
- patch: |-
    - op: add
      path: /spec/template/spec/containers/0/env/-
      value:
        name: FORWARD_EXTERNAL_MESSAGES
        value: "false"
  target:
    kind: Deployment
    name: broadcaster-deployment

images:
- name: PROJECT/BROADCASTER
  newName: europe-north1-docker.pkg.dev/my-dwk-gke/my-repository/dwk-environments-broadcaster
  newTag: main-24f3e7edf171e1a1f19ff2111da8daecc12cafeb
- name: PROJECT/TODO-APP
  newName: europe-north1-docker.pkg.dev/my-dwk-gke/my-repository/dwk-environments
  newTag: main-24f3e7edf171e1a1f19ff2111da8daecc12cafeb
- name: PROJECT/todo-backend
  newName: europe-north1-docker.pkg.dev/my-dwk-gke/my-repository/dwk-environments-backend
  newTag: main-24f3e7edf171e1a1f19ff2111da8daecc12cafeb
